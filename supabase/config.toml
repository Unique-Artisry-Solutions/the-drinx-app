
# A string used to distinguish different Supabase projects on the same host. Defaults to the project ID.
project_id = "dvifibvzwunnpcsihpxq"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
# Extra schemas to add to the PATH
extra_search_path = ["public", "extensions"]
# Max rows returned from a view, table, or stored procedure. Limits payload size
# for accidental or malicious requests.
max_rows = 1000

[db]
# Port to use for the local database URL.
port = 54322
# The database major version to use. This has to be the same as your remote database's.
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://localhost"

# Email testing server. Emails sent with the local dev setup are not actually sent - rather, they
# are monitored, and you can view the emails that would have been sent from the web interface.
[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.sms]
enable_signup = true
enable_confirmations = true

# Configure Edge Functions
[functions]
enabled = true
port = 54321

# Configure feature gate access function - make it publicly accessible
[functions.check-feature-access]
verify_jwt = false
