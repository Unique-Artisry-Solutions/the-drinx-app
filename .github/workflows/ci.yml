name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test -- --run

  post-merge:
    # Run only on successful merge to main (push events, not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Extract task IDs from commit message or PR body
        id: extract-task-ids
        run: |
          # Extract task IDs from commit message (pattern: "TASK-<id>" or "Task #<id>")
          COMMIT_MSG=$(git log -1 --pretty=%B)
          TASK_IDS=$(echo "$COMMIT_MSG" | grep -oE '(TASK|Task|task)-[a-f0-9\-]{36}|#[0-9]+' | sort -u || true)
          echo "task_ids=$(echo "$TASK_IDS" | tr '\n' ' ')" >> $GITHUB_OUTPUT
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT

      - name: Update task status in DevOps HQ
        if: steps.extract-task-ids.outputs.task_ids != ''
        run: |
          TASK_IDS="${{ steps.extract-task-ids.outputs.task_ids }}"
          DEVOPS_HQ_URL="https://myxxit-devopshq.onrender.com"
          
          for TASK_ID in $TASK_IDS; do
            # Remove prefix if present
            TASK_ID=$(echo "$TASK_ID" | sed 's/^[#TASK-]*//g')
            
            echo "Updating task $TASK_ID to completed status..."
            
            RESPONSE=$(curl -s -X PUT \
              "$DEVOPS_HQ_URL/api/tasks/$TASK_ID" \
              -H "Authorization: Bearer ${{ secrets.DEVOPS_HQ_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d '{"status": "completed"}')
            
            # Log response for debugging
            echo "Response: $RESPONSE"
            
            # Check if update was successful
            if echo "$RESPONSE" | grep -q '"task"'; then
              echo "✓ Task $TASK_ID marked as completed"
            else
              echo "⚠ Warning: Task $TASK_ID update may have failed. Check API response above."
            fi
          done
        env:
          DEVOPS_HQ_API_KEY: ${{ secrets.DEVOPS_HQ_API_KEY }}
