name: RLS Security Tests

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'supabase/migrations/**'
      - 'tests/**'
      - 'src/**'
  push:
    branches: [ main ]
    paths:
      - 'supabase/migrations/**'
      - 'tests/**'
      - 'src/**'

jobs:
  rls-security-tests:
    runs-on: ubuntu-latest
    name: RLS Security Regression Tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vitest
        run: npm install -D vitest @vitest/ui

      - name: Run RLS Security Tests
        run: npm run test:rls
        env:
          NODE_ENV: test
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rls-test-results
          path: |
            coverage/
            test-results.xml
          retention-days: 7

      - name: Comment PR with security test results
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🔒 **RLS Security Tests Failed**\n\nOne or more security tests failed. Please review the test results and ensure all Row-Level Security policies are properly configured before merging.\n\n⚠️ **This may indicate a security vulnerability** - do not merge until tests pass.'
            })

  security-audit:
    runs-on: ubuntu-latest
    name: Security Audit
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Run security audit
        run: npm audit --audit-level high

      - name: Check for security vulnerabilities
        run: |
          if npm audit --audit-level high --json | jq '.vulnerabilities | length' | grep -v '^0$'; then
            echo "❌ Security vulnerabilities found!"
            exit 1
          else
            echo "✅ No high-severity vulnerabilities found"
          fi